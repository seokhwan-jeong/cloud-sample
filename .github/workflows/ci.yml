name: Java CI with Maven

on:
  workflow_dispatch:

env:
  ACR_LOGIN_SERVER: acrcloudbizcecomm.azurecr.io
  IMAGE_NAME: 82210889/cloud-sample

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B package --file pom.xml

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v1

      - name: Generate Version
        id: gen-version
        run: echo "VERSION=$(date +%Y%m%d%H%M)" >> $GITHUB_OUTPUT

      - name: ACR Login
        uses: azure/docker-login@v2
        with:
          login-server: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build & Tag Image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ steps.gen-version.outputs.VERSION }} -f Dockerfile-maven .
          docker tag ${{ env.IMAGE_NAME }}:${{ steps.gen-version.outputs.VERSION }} ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ steps.gen-version.outputs.VERSION }}

      - name: Push Image
        run: |
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ steps.gen-version.outputs.VERSION }}

      - name: Update Kubernetes resources
        run: |
          cd manifests/overlays/prod
          kustomize edit set image ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ steps.gen-version.outputs.VERSION }}
          cat kustomization.yaml

      - name: Commit and Push changes
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"
          git add manifests/overlays/prod/kustomization.yaml
          git commit -m "Update image tag to ${{ steps.gen-version.outputs.VERSION }}" || echo "No changes to commit"
          git push origin main